name: gate

# Server-side wall. Local husky hooks are bypassable with --no-verify;
# this makes the gate unbypassable for anything that reaches GitHub.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history so gitleaks can scan commits

      - name: Install gitleaks
        run: |
          curl -sSfL \
            https://github.com/gitleaks/gitleaks/releases/download/v8.18.4/gitleaks_8.18.4_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks

      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Gate wall (pnpm gate)
        run: pnpm gate

      - name: Vulnerability audit (prod deps)
        run: pnpm audit --prod --audit-level=high

      - name: License allowlist
        run: pnpm licenses:check
